name: codeql

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [csharp]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10 + MAUI Android workload
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          workloads: maui-android

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Restore
        run: |
          dotnet restore ./src/Soenneker.Maui.Blazor.Bridge.csproj
          dotnet restore ./test/Soenneker.Maui.Blazor.Bridge.Tests/Soenneker.Maui.Blazor.Bridge.Tests.csproj
          dotnet restore ./test/Soenneker.Maui.Blazor.Bridge.Demo/Soenneker.Maui.Blazor.Bridge.Demo.csproj

      - name: Build
        run: |
          dotnet build ./src/Soenneker.Maui.Blazor.Bridge.csproj -c Release --no-restore
          dotnet build ./test/Soenneker.Maui.Blazor.Bridge.Tests/Soenneker.Maui.Blazor.Bridge.Tests.csproj -c Release --no-restore
          dotnet build ./test/Soenneker.Maui.Blazor.Bridge.Demo/Soenneker.Maui.Blazor.Bridge.Demo.csproj -c Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4